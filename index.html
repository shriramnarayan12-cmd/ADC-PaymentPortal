<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADC Fee Portal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #d35400; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #555; }
        select, .btn-pay { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        select:disabled { background: #eee; cursor: not-allowed; }
        .fee-info { background: #fff3e0; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; border-left: 5px solid var(--accent); text-align: center; }
        .amount-text { font-size: 32px; font-weight: 800; color: var(--primary); margin: 5px 0; }
        .late-msg { color: #d35400; font-size: 14px; font-weight: 600; margin-bottom: 15px; }
        .btn-pay { display: block; background: #27ae60; color: white; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; transition: background 0.3s; }
        #loading { font-size: 12px; color: #888; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>ADC Fee Portal</h2>
    <label>Select Batch</label>
    <select id="batchSelect" onchange="fetchStudents()">
        <option value="">-- Choose Batch --</option>
        <option value="1153102505">Adithi 5PM</option>
        <option value="2130741082">Adithi 6PM</option>
        <option value="1750523098">Smruthi - 5PM</option>
        <option value="2003881472">Meera - 6PM</option>
        <option value="1136159670">Medha - 7PM</option>
        <option value="1538392135">Medha - 5PM</option>
        <option value="0">NR - BTYM 8PM</option>
    </select>

    <label>Student Name</label>
    <select id="studentSelect" disabled onchange="resetDisplay()">
        <option value="">-- Select Batch First --</option>
    </select>
    <div id="loading">Syncing Students...</div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <label>Payment Plan</label>
    <select id="frequency" onchange="updatePeriodOptions()">
        <option value="monthly">Monthly (₹3000)</option>
        <option value="quarterly">Quarterly (₹9000)</option>
    </select>

    <label id="periodLabel">Select Month</label>
    <select id="periodSelect" onchange="calculateFinalFee()">
        <option value="">-- Select --</option>
    </select>

    <div id="feeDisplayArea" class="fee-info">
        <div style="font-size: 14px; color: #666;">Total Amount Due</div>
        <div class="amount-text" id="displayAmount">₹0</div>
        <div class="late-msg" id="lateFeeText"></div>
        <a href="#" id="gpayLink" class="btn-pay">OPEN PAYMENT APP</a>
        <p style="font-size: 11px; color: #777; margin-top: 10px;">Note: If GPay loops, try PhonePe or Paytm.</p>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz1MrHy_-g9ZG6nuNzpjOSvEQWguKLuGgYQUrcnyQDPj7IyzxOKt8qDriBRUzFHqTAI/exec";
    const BASE_MONTHLY = 3000;
    const BASE_QUARTERLY = 9000;

    const months = ["June", "July", "August", "September", "October", "November", "December", "January", "February", "March"];
    const quarters = [{ label: "June/July/Aug", code: "Q1" }, { label: "Sept/Oct/Nov", code: "Q2" }, { label: "Dec/Jan/Feb", code: "Q3" }, { label: "March/Apr/May", code: "Q4" }];

    function updatePeriodOptions() {
        const freq = document.getElementById('frequency').value;
        const periodSelect = document.getElementById('periodSelect');
        const periodLabel = document.getElementById('periodLabel');
        periodSelect.innerHTML = '<option value="">-- Select --</option>';
        if (freq === 'monthly') {
            periodLabel.innerText = "Select Month";
            months.forEach(m => periodSelect.add(new Option(m, m)));
        } else {
            periodLabel.innerText = "Select Quarter";
            quarters.forEach(q => periodSelect.add(new Option(q.label, q.code)));
        }
        resetDisplay();
    }

    async function fetchStudents() {
        const gid = document.getElementById('batchSelect').value;
        const studentDropdown = document.getElementById('studentSelect');
        if (!gid) return;
        studentDropdown.disabled = true;
        studentDropdown.innerHTML = '<option value="">Loading...</option>';
        document.getElementById('loading').style.display = 'block';
        resetDisplay();
        try {
            const response = await fetch(`${SCRIPT_URL}?gid=${gid}&v=${new Date().getTime()}`);
            const data = await response.json();
            studentDropdown.innerHTML = '<option value="">-- Select Student --</option>';
            data.forEach(student => {
                if (student.Name) {
                    let opt = document.createElement('option');
                    opt.value = student["Reg #"] || student.Name;
                    opt.textContent = student.Name;
                    studentDropdown.appendChild(opt);
                }
            });
            studentDropdown.disabled = false;
        } catch (e) { studentDropdown.innerHTML = '<option value="">Error loading students</option>'; }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    function calculateFinalFee() {
        const freq = document.getElementById('frequency').value;
        const periodCode = document.getElementById('periodSelect').value;
        const studentSelect = document.getElementById('studentSelect');
        const regId = studentSelect.value;

        if (!periodCode || !regId) {
            document.getElementById('feeDisplayArea').style.display = 'none';
            return;
        }

        const day = new Date().getDate();
        let base = (freq === 'monthly') ? BASE_MONTHLY : BASE_QUARTERLY;
        let lateFee = (day > 20) ? 750 : (day > 15 ? 500 : 0);
        const total = base + lateFee;

        document.getElementById('displayAmount').innerText = `₹${total}`;
        document.getElementById('lateFeeText').innerText = lateFee > 0 ? `Includes ₹${lateFee} late fee` : "Standard fee applied";
        document.getElementById('feeDisplayArea').style.display = 'block';

        // THE FIX: Personal Name + Unique TR ID stops security loops
        const upiId = "behereanand@okicici"; 
        const name = encodeURIComponent("Anand"); 
        const note = encodeURIComponent(`${regId} ${periodCode}`); 
        const refId = "ADC" + Math.floor(Math.random() * 1000000); 

        // Simplified P2P link structure
        const upiUrl = `upi://pay?pa=${upiId}&pn=${name}&am=${total}&tn=${note}&tr=${refId}&cu=INR`;
        document.getElementById('gpayLink').href = upiUrl;
    }

    function resetDisplay() { document.getElementById('feeDisplayArea').style.display = 'none'; }
    window.onload = updatePeriodOptions;
</script>
</body>
</html>
